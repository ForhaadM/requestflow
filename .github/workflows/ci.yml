name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  backend:
    name: Backend (pytest)
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: requestflow_ci
          POSTGRES_PASSWORD: requestflow_ci_pw
          POSTGRES_DB: requestflow_ci
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U requestflow_ci"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    env:
      POSTGRES_USER: requestflow_ci
      POSTGRES_PASSWORD: requestflow_ci_pw
      POSTGRES_DB: requestflow_ci
      POSTGRES_HOST: localhost
      POSTGRES_PORT: 5432
      SECRET_KEY: ${{ secrets.TEST_SECRET_KEY }}

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: "pip"
          cache-dependency-path: backend/requirements.txt

      - name: Install backend dependencies
        run: pip install -r requirements.txt
        working-directory: backend

      - name: Run pytest suite
        run: pytest -v
        working-directory: backend

  frontend:
    name: Frontend (build & lint)
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: frontend/package-lock.json

      - name: Install frontend dependencies
        run: npm ci
        working-directory: frontend

      - name: Lint
        run: npm run lint
        working-directory: frontend

      - name: Build
        run: npm run build
        working-directory: frontend
